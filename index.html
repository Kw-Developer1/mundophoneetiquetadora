<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Mundo Phone - Etiquetadora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="icon" type="image/png" href="https://r2.fivemanage.com/6UIf1zst1DpiMJ7emslop/mundophone-logo-blanco.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ░░ LOADING SCREEN ░░ -->
<div class="nav-loading" id="nav-loading">
    <div class="nav-loading-inner">
        <img src="https://r2.fivemanage.com/6UIf1zst1DpiMJ7emslop/mundophone-logo-blanco.png" class="nav-loading-logo" alt="Mundo Phone">
    </div>
</div>

<!-- Drag & Drop overlay global -->
<div class="drop-overlay" id="drop-overlay">
    <div class="drop-overlay-inner">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <p>Suelta aquí tu archivo</p>
    </div>
</div>

<div class="header">
    <div class="logo">
        <div class="logo-icon"><i class="fa-solid fa-tag"></i></div>
        <div>
            <div class="logo-text">Mundo Phone</div>
            <div class="logo-sub">Etiqueta</div>
        </div>
    </div>
    <div class="header-actions">
        <input type="file" id="file-input" accept="image/*,.pdf" style="display:none">

        <!-- ░░ BOTÓN NAVEGACIÓN ░░ -->
        <button class="btn btn-ghost btn-nav" id="btn-nav" onclick="navigateTo('https://mundophoneetiquetadora.vercel.app/recibic/recibic.html')" title="Ir a otra página">
            <i class="fa-regular fa-file-lines"></i>
        </button>

        <button class="btn btn-ghost btn-theme" id="btn-theme" onclick="toggleTheme()" title="Cambiar tema">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
        <button class="btn btn-ghost" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-arrow-up-from-bracket"></i> Subir
        </button>
        <button class="btn btn-primary" id="btn-crop">
            <i class="fa-solid fa-scissors"></i> Recortar e imprimir
        </button>
    </div>
</div>

<div class="canvas-wrapper">
    <div class="canvas-card" id="drop-zone">
        <div class="canvas-toolbar">
            <div class="toolbar-left">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
                <span class="toolbar-label">editor</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <button class="btn-remove-file" id="btn-remove-file" onclick="removeFile()" style="display:none" title="Eliminar archivo"><i class="fa-solid fa-xmark"></i> Eliminar</button>
                <span class="toolbar-hint">
                <i class="fa-solid fa-hand-pointer"></i> Arrastra un archivo aquí
            </span>
            </div>
        </div>
        <div class="img-box">
            <img id="main-image">
            <div class="empty-state">
                <i class="fa-regular fa-image"></i>
                <p>Sube o arrastra una imagen / PDF</p>
            </div>
        </div>

        <!-- Barra de navegación PDF -->
        <div class="pdf-nav" id="pdf-nav">
            <span class="pdf-nav-label"><i class="fa-regular fa-file-pdf"></i></span>
            <button class="pdf-nav-btn" id="pdf-prev" onclick="changePdfPage(-1)">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="pdf-page-pills" id="pdf-pills"></div>
            <div class="pdf-page-input-wrap" id="pdf-manual-wrap">
                <input type="number" class="pdf-page-input" id="pdf-manual-input" min="1" placeholder="Nº">
                <button class="pdf-page-go" onclick="goToManualPage()">Ir</button>
            </div>
            <button class="pdf-nav-btn" id="pdf-next" onclick="changePdfPage(1)">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
            <span class="pdf-total" id="pdf-total"></span>
            <div class="pdf-loading" id="pdf-loading">
                <i class="fa-solid fa-circle-notch"></i> Cargando…
            </div>
        </div>
    </div>
</div>

<div class="history-panel closed" id="history-panel">
    <div class="history-header" onclick="toggleHistory()">
        <div class="history-title">
            <i class="fa-solid fa-clock-rotate-left"></i>
            Historial
        </div>
        <div class="history-controls">
            <button class="btn-clear" onclick="clearHistory(event)">
                <i class="fa-solid fa-trash"></i> Borrar todo
            </button>
            <div class="toggle-icon"><i class="fa-solid fa-chevron-up"></i></div>
        </div>
    </div>
    <div class="history-body">
        <div class="gallery" id="gallery"></div>
    </div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></div>
    <img id="modal-img">
</div>

<div id="print-area"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="script.js"></script>
<script>

    function navigateTo(url) {
        const screen = document.getElementById('nav-loading');

        // Fase 1 — fade IN
        screen.classList.add('visible');
        setTimeout(() => {
            screen.classList.add('hiding');
            setTimeout(() => {
                window.location.href = url;
            }, 600); // duración del fade-out
        }, 1600);
    }
</script>
</body>

</html>
